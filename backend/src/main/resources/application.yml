spring:
  application:
    name: hrm-backend
  profiles:
    default: dev

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

hrm:
  security:
    jwt:
      secret: ${HRM_JWT_SECRET:dev-test-only-change-this-secret-32-bytes-minimum}
      expires-in: ${HRM_JWT_EXPIRES_IN:3600}
