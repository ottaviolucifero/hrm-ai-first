<div class="app-email-field">
  <label class="app-email-label" [for]="inputId">
    {{ label }}
    @if (required) {
      <strong class="email-field-required" aria-hidden="true">*</strong>
    }
  </label>

  <input
    [id]="inputId"
    class="app-email-control"
    type="email"
    autocomplete="email"
    [attr.aria-describedby]="showErrors ? errorId : null"
    [attr.aria-invalid]="showErrors"
    [formControl]="control"
    [placeholder]="placeholder"
  />

  @if (showErrors) {
    <p class="app-email-error" [id]="errorId">
      @if (control.hasError('required')) {
        <span>{{ i18n.t('form.email.required') }}</span>
      } @else if (control.hasError('email')) {
        <span>{{ i18n.t('form.email.invalid') }}</span>
      }
    </p>
  }
</div>
