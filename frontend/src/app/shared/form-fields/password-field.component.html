<label class="kt-label mb-2 block" for="loginPassword">{{ label }}</label>
<div class="kt-input flex items-center">
  <input
    id="loginPassword"
    class="grow"
    autocomplete="current-password"
    [attr.aria-invalid]="showErrors"
    [formControl]="control"
    [placeholder]="placeholder"
    [type]="inputType"
  />
  <button
    class="password-toggle kt-btn kt-btn-icon kt-btn-ghost kt-btn-sm"
    type="button"
    [attr.aria-label]="passwordVisible ? 'Nascondi password' : 'Mostra password'"
    (click)="togglePasswordVisibility()"
  >
    @if (passwordVisible) {
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path
          d="M3 3.8 20.2 21 21 20.2 3.8 3 3 3.8Zm6.3 6.6a3 3 0 0 0 4.3 4.3l-1.1-1.1a1.5 1.5 0 0 1-2.1-2.1l-1.1-1.1ZM12 6.5c4.2 0 7.1 3.4 8.2 5.5-.4.8-1.1 1.8-2.1 2.7l1.1 1.1c1.2-1.1 2.1-2.4 2.5-3.3l.2-.5-.2-.5C20.6 9.2 17.1 5 12 5c-1.4 0-2.7.3-3.9.9l1.2 1.2c.8-.4 1.7-.6 2.7-.6Zm0 11c-4.2 0-7.1-3.4-8.2-5.5.5-1 1.5-2.3 3-3.4L5.7 7.5c-1.8 1.3-3 3-3.6 4l-.2.5.2.5C3.4 14.8 6.9 19 12 19c1.5 0 2.9-.4 4.1-1l-1.2-1.2c-.9.4-1.8.7-2.9.7Z"
        />
      </svg>
    } @else {
      <svg aria-hidden="true" viewBox="0 0 24 24">
        <path
          d="M12 5C6.9 5 3.4 9.2 2.1 11.5l-.2.5.2.5C3.4 14.8 6.9 19 12 19s8.6-4.2 9.9-6.5l.2-.5-.2-.5C20.6 9.2 17.1 5 12 5Zm0 12.5c-4.2 0-7.1-3.4-8.2-5.5 1.1-2.1 4-5.5 8.2-5.5s7.1 3.4 8.2 5.5c-1.1 2.1-4 5.5-8.2 5.5Zm0-9a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7Zm0 5.5a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"
        />
      </svg>
    }
  </button>
</div>

@if (showErrors) {
  <div class="mt-1.5 text-xs text-destructive">
    @if (control.hasError('required')) {
      <span>Password obbligatoria.</span>
    }
  </div>
}
