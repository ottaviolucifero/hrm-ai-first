<section class="filter-panel">
  <div class="filter-panel-toggle-row">
    <button
      class="filter-panel-toggle"
      type="button"
      [disabled]="disabled"
      [attr.aria-expanded]="expanded()"
      [attr.aria-controls]="panelId"
      [attr.aria-label]="i18n.t('filterPanel.toggleAriaLabel')"
      (click)="toggleExpanded()">
      <span class="filter-panel-toggle-content">
        <span class="filter-panel-toggle-label">
          <i class="ki-filled ki-setting-4" aria-hidden="true"></i>
          <span>{{ i18n.t('filterPanel.toggleLabel') }}</span>
        </span>

        <span class="filter-panel-toggle-meta">
          @if (hasActiveFilters) {
            <span
              class="filter-panel-active-count"
              [attr.aria-label]="activeFiltersAriaLabel">
              {{ normalizedActiveFilterCount() }}
            </span>
          }

          <span class="filter-panel-chevron" aria-hidden="true">
            <i
              class="ki-filled"
              [class.ki-down]="expanded()"
              [class.ki-right]="!expanded()"></i>
          </span>
        </span>
      </span>
    </button>
  </div>

  <div
    [id]="panelId"
    class="filter-panel-content"
    role="region"
    [hidden]="!expanded()"
    [attr.aria-label]="i18n.t('filterPanel.panelAriaLabel')">
    <ng-content></ng-content>
  </div>
</section>
