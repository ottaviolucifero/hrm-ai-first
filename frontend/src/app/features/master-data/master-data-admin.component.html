<section class="kt-container-fixed py-4" aria-labelledby="master-data-title">
  <div class="master-data-layout">
    <div class="master-data-toolbar">
      <div>
        <h1 id="master-data-title" class="text-xl font-semibold text-mono">{{ i18n.t('masterData.title') }}</h1>
      </div>
      <div class="master-data-toolbar-actions">
        @if (canCreate()) {
          <button class="kt-btn kt-btn-primary kt-btn-sm" type="button" [disabled]="loading()" (click)="openCreateForm()">
            {{ i18n.t('masterData.actions.new') }}
          </button>
        }
        <button class="kt-btn kt-btn-outline kt-btn-sm" type="button" [disabled]="loading()" (click)="refresh()">
          {{ i18n.t('masterData.refresh') }}
        </button>
      </div>
    </div>

    <div class="master-data-filters">
      <label class="master-data-field">
        <span>{{ i18n.t('masterData.category') }}</span>
        <select class="kt-input" [value]="selectedCategoryId()" (change)="updateCategory($event)">
          @for (category of categories; track category.id) {
            <option [value]="category.id">{{ i18n.t(category.titleKey) }}</option>
          }
        </select>
      </label>

      <label class="master-data-field">
        <span>{{ i18n.t('masterData.entity') }}</span>
        <select class="kt-input" [value]="selectedResourceId()" (change)="updateResource($event)">
          @for (resource of selectedCategory().resources; track resource.id) {
            <option [value]="resource.id">{{ i18n.t(resource.titleKey) }}</option>
          }
        </select>
      </label>

      <label class="master-data-field">
        <span>{{ i18n.t('masterData.search') }}</span>
        <input
          class="kt-input"
          type="search"
          [value]="searchInput()"
          [placeholder]="i18n.t('masterData.searchPlaceholder')"
          (input)="updateSearch($event)" />
      </label>
    </div>

    <app-data-table
      [columns]="selectedResource().columns"
      [rows]="rows()"
      [rowActions]="selectedResource().rowActions ?? []"
      [pageData]="pageData()"
      [loading]="loading()"
      [hasError]="hasError()"
      (rowAction)="handleRowAction($event)"
      (previousPage)="goToPreviousPage()"
      (nextPage)="goToNextPage()" />

    @if (isFormOpen()) {
      <div class="master-data-modal-overlay" role="presentation">
        <div class="master-data-modal" role="dialog" aria-modal="true" aria-labelledby="master-data-form-title">
          <app-master-data-form
            [mode]="openFormMode()"
            [resourceTitleKey]="selectedResource().titleKey"
            [fields]="formFields()"
            [value]="formValue()"
            (save)="handleFormSave($event)"
            (cancel)="handleFormCancel()"
            (close)="closeForm()" />
        </div>
      </div>
    }
  </div>
</section>
