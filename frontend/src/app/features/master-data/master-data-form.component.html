<section class="kt-card master-data-form-panel" aria-labelledby="master-data-form-title">
  <div class="kt-card-header master-data-form-header">
    <div class="master-data-form-heading">
      <h2 id="master-data-form-title" class="kt-card-title text-lg master-data-form-title">
        {{ i18n.t(titleKey()) }} - {{ i18n.t(resourceTitleKey) }}
      </h2>
    </div>
    <app-button
      class="master-data-form-close"
      variant="ghost"
      size="sm"
      icon="ki-filled ki-cross"
      [iconOnly]="true"
      [ariaLabel]="i18n.t('masterData.form.close')"
      [label]="i18n.t('masterData.form.close')"
      [disabled]="submitting"
      (pressed)="close.emit()" />
  </div>

  <form class="kt-card-content master-data-form-body" [formGroup]="form" (ngSubmit)="submit()">
    <div class="master-data-form-fields">
      @for (field of normalizedFields; track field.key) {
        <label
          class="master-data-form-field"
          [class.master-data-form-field--checkbox]="fieldType(field) === 'boolean'">
          @if (fieldType(field) === 'boolean') {
            <input
              class="master-data-form-checkbox"
              type="checkbox"
              [formControlName]="field.key"
              [disabled]="isFieldReadOnly(field)" />
            <span class="master-data-form-checkbox-indicator" aria-hidden="true"></span>
            <span class="master-data-form-checkbox-label">
              {{ i18n.t(field.labelKey) }}
              @if (field.required) {
                <span aria-hidden="true">*</span>
              }
            </span>
          } @else {
            <span class="master-data-form-label">
              {{ i18n.t(field.labelKey) }}
              @if (field.required) {
                <span aria-hidden="true">*</span>
              }
            </span>

            <input
              class="kt-input master-data-form-input"
              type="text"
              [formControlName]="field.key"
              [readonly]="isFieldReadOnly(field)" />
          }

          @if (hasRequiredError(field)) {
            <span class="master-data-form-error">{{ i18n.t('masterData.form.required') }}</span>
          }
        </label>
      }
    </div>

    @if (mode !== 'view') {
      <div class="master-data-form-actions">
        <app-button
          variant="secondary"
          size="sm"
          [label]="i18n.t('masterData.form.cancel')"
          [disabled]="submitting"
          (pressed)="resetAndCancel()" />
        <app-button
          variant="primary"
          size="sm"
          type="submit"
          icon="ki-filled ki-check"
          [label]="i18n.t('masterData.form.save')"
          [loading]="submitting" />
      </div>
    }
  </form>
</section>
