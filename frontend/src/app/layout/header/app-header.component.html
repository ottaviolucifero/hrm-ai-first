<header
  id="header"
  class="kt-header fixed start-0 end-0 top-0 z-10 flex items-center border-b border-border bg-background"
>
  <div class="kt-container-fluid flex items-center justify-between gap-4">
    <div class="flex min-w-0 items-center gap-3">
      <button
        id="sidebar_toggle"
        class="kt-btn kt-btn-icon kt-btn-ghost lg:hidden"
        type="button"
        aria-label="Toggle sidebar"
      >
        <span class="block h-4 w-4 rounded-sm border border-current"></span>
      </button>

      <div class="min-w-0">
        <div class="text-sm font-semibold text-mono">HRflow</div>
        <div class="text-xs text-secondary-foreground">Area riservata</div>
      </div>
    </div>

    <div class="relative flex items-center gap-3">
      <button
        class="flex size-10 items-center justify-center rounded-full border border-primary/30 bg-primary/10 text-primary hover:bg-primary/15"
        type="button"
        aria-label="Profilo utente"
        aria-haspopup="menu"
        [attr.aria-expanded]="profileMenuOpen()"
        (click)="toggleProfileMenu()"
      >
        <i class="ki-filled ki-profile-circle text-2xl" aria-hidden="true"></i>
      </button>

      @if (profileMenuOpen()) {
        <div
          class="absolute end-0 z-30 mt-2 w-44 rounded-md border border-border bg-background py-1 shadow-lg"
          style="top: 100%;"
          role="menu"
          aria-label="Menu profilo"
        >
          <button
            class="flex w-full items-center px-3 py-2 text-left text-sm text-secondary-foreground"
            type="button"
            role="menuitem"
            (click)="closeProfileMenu()"
          >
            Profilo
          </button>

          <button
            class="flex w-full items-center px-3 py-2 text-left text-sm font-bold text-destructive hover:bg-muted"
            type="button"
            role="menuitem"
            (click)="logout()"
          >
            Logout
          </button>
        </div>
      }
    </div>
  </div>
</header>
